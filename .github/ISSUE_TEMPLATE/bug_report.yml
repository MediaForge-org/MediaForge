name: Bug report
description: Report a defect in MediaForge
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! For **security** issues, do not use this form —
        see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MediaForge version / commit
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS/host, Docker version, Jellyfin/Audiobookshelf versions if relevant.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Output of `docker compose logs` or `php artisan mediaforge:doctor` (redact secrets).
      render: shell
