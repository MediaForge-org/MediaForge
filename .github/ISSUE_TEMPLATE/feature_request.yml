name: Feature request
description: Suggest an enhancement for MediaForge
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do that MediaForge doesn't support yet?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Connectors (Jellyfin / Audiobookshelf / other)
        - Dashboard / UI
        - Settings
        - Backup / Health
        - Other
