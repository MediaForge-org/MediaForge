[www]
; Listen on TCP so nginx (same container) can reach php-fpm.
listen = 127.0.0.1:9000
user = www-data
group = www-data

pm = dynamic
pm.max_children = 20
pm.start_servers = 3
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; Surface php-fpm logs on stderr for `docker logs`.
catch_workers_output = yes
decorate_workers_output = no
clear_env = no
